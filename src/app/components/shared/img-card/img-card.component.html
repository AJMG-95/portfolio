<article
  class="flex flex-col md:flex-row overflow-hidden rounded-lg shadow-md-lg shadow-black/20 dark:shadow-white/10 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900">

  <!-- Imagen -->
  <div class="relative w-full md:w-1/3 aspect-[4/3] md:aspect-auto">
    <img [src]="imageUrl" [alt]="altText" class="w-full h-full object-cover" loading="lazy" decoding="async" />

    <!-- Texto superpuesto SOLO en móvil -->
    <div class="absolute inset-0 md:hidden flex items-end p-3 bg-gradient-to-t from-black/60 to-transparent">
      <p class="text-white text-base font-medium">{{ text }}</p>
    </div>
  </div>

  <!-- Texto en horizontal (tablet y +) -->
  <div class="hidden md:flex items-center p-4">
    <p class="text-base text-gray-800 dark:text-gray-200 font-medium">{{ text }}</p>
  </div>

</article>
