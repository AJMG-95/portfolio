@switch (tag) { @case ('h1') {
<h1 [class]="class">
  <span>{{ visibleText }}</span
  ><span *ngIf="showCursor" class="animate-blink">|</span>
</h1>

} @case ('h2') {

<h2 [class]="class">
  <span>{{ visibleText }}</span
  ><span *ngIf="showCursor" class="animate-blink">|</span>
</h2>
} @case ('p') {

<p [class]="class">
  <span>{{ visibleText }}</span
  ><span *ngIf="showCursor" class="animate-blink">|</span>
</p>
} }
