<label class="flex items-center gap-3 cursor-pointer select-none" aria-label="Cambiar idioma Español/Inglés"
  title="Cambiar idioma">
  <!-- Bandera ES (se atenúa cuando está EN) -->
  <img src="assets/images/flags/esFlag.webp" alt="Español" class="h-5 w-5 rounded shadow-sm transition-opacity"
    [class.opacity-40]="isEnglish()" />

  <!-- Switch: input oculto (sr-only) + pista + thumb con peer -->
  <span class="relative inline-flex h-4 w-8 items-center">
    <input type="checkbox" class="peer sr-only" [checked]="isEnglish()" (change)="onToggle()"
      aria-label="Language toggle" />
    <!-- Pista -->
    <span class="absolute inset-0 rounded-full transition
             bg-gray-300 dark:bg-gray-700
             peer-checked:bg-primary"></span>
    <!-- Thumb -->
    <span class="relative h-5 w-5 rounded-full bg-white shadow transition
             translate-x-0 peer-checked:translate-x-5"></span>

    <!-- Enfoque accesible (anillo en la pista al enfocar el input) -->
    <span class="pointer-events-none absolute inset-0 rounded-full
             ring-0 ring-offset-2 ring-blue-600 transition
             peer-focus-visible:ring-2" aria-hidden="true"></span>
  </span>

  <!-- Bandera EN (se atenúa cuando está ES) -->
  <img src="assets/images/flags/gbFlag.webp" alt="English" class="h-5 w-5 rounded shadow-sm transition-opacity"
    [class.opacity-40]="!isEnglish()" />
</label>
