<div
  class="banner flex items-center justify-between px-6 py-4 h-full w-full bg-cover bg-center rounded-t-md"
  [style.background-image]="
    'url(' + (isTechCourse ? techBannerUrl : nonTechBannerUrl) + ')'
  "
>
  <h1 class="text-white text-xl sm:text-2xl font-bold">{{ title }}</h1>
  @if ( iconUrl ) {
  <img
    [src]="iconUrl"
    [alt]="title + ' Logo'"
    class="h-10 sm:h-12 object-contain"
  />

  }
</div>
