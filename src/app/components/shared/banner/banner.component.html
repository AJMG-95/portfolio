<div class="banner flex items-center justify-between px-6 py-4 h-full w-full bg-cover bg-center rounded-t-md"
  [ngClass]="isTechCourse ? 'banner--tech' : 'banner--nontech'">
  <h1 class="dark:text-white text-xl sm:text-2xl font-bold">{{ title }}</h1>
  <img *ngIf="iconUrl" [src]="iconUrl" [alt]="title + ' Logo'" class="h-10 sm:h-12 object-contain" />
</div>
