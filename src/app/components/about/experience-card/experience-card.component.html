<article
  class="flex flex-col gap-4 p-5 rounded-md overflow-hidden border border-borderLight dark:border-darkBorderLight shadow-sm bg-secondary dark:bg-gray-900 transition-colors"
  role="group"
  aria-labelledby="experience-card-title"
>
  <!-- Header: Logo + nombre -->
  <header class="flex items-center gap-3">
    <img
      *ngIf="imageUrl"
      [src]="imageUrl"
      [alt]="altText"
      class="w-10 h-10 object-contain rounded bg-white dark:bg-gray-800 border"
    />

    <h3
      id="experience-card-title"
      class="text-xl font-semibold text-textMain dark:text-darkTextMain"
    >
      <a
        *ngIf="titleLink; else plainTitle"
        [href]="titleLink"
        target="_blank"
        rel="noopener noreferrer"
        class="hover:underline hover:text-primary dark:hover:text-darkHighlight"
      >
        {{ title }}
      </a>
      <ng-template #plainTitle>{{ title }}</ng-template>
    </h3>
  </header>

  <!-- Rol y fechas -->
  <section>
    <h4 class="text-lg font-semibold text-textMain dark:text-darkTextMain">
      {{ role }}
    </h4>
    <p class="text-sm text-gray-500 dark:text-gray-100">{{ dates }}</p>
  </section>

  <!-- Lista de tareas -->
  <section *ngIf="tasks?.length" aria-label="Responsabilidades desempeñadas">
    <ul class="list-disc ml-5 space-y-1 text-textMain dark:text-darkTextMain">
      <li *ngFor="let task of tasks">{{ task }}</li>
    </ul>
  </section>

  <!-- Chips de tecnologías -->
  <section *ngIf="technologies && technologies.length" class="pt-3">
    <h5 class="sr-only">Tecnologías usadas</h5>
    <ul
      class="flex flex-wrap gap-3 justify-start text-gray-700"
      aria-label="Tecnologías utilizadas"
    >
      <li *ngFor="let tech of technologies">
        <my-chip
          [label]="tech.label"
          [icon]="tech.icon"
          [addClasses]="tech.color!"
        />
      </li>
    </ul>
  </section>
</article>
