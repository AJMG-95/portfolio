<section class="relative touch-manipulation ">
  <span class="sr-only">{{ type }}</span>

  <div class="inline-flex flex-col items-center group relative" (mouseenter)="hovered.emit(value)">
    <!-- BOTÓN -->
    <a [href]="href" [attr.target]="external && type === 'link' ? '_blank' : null"
      [attr.rel]="external && type === 'link' ? 'noopener noreferrer' : null" [attr.aria-label]="ariaLabel" class="btn btn-primary min-w-[125px] normal-case
             flex items-center gap-2
             shadow-md-lg hover:shadow-lg shadow-black/20 hover:shadow-primary/20 dark:shadow-white/10
             rounded-lg md:rounded-xl
             px-3 py-2 md:px-4 md:py-2
             transition-all duration-200
             focus:outline-none focus-visible:ring-2 focus-visible:ring-focusOutline
             dark:focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">
      <span class="transition-transform duration-150 group-hover:scale-125 group-active:scale-95 scale">
        <ng-content select="[icon]"></ng-content>
      </span>
      <span class="font-medium">{{ label || type }}</span>
    </a>

    <!-- Tooltip -->
    <div class="pointer-events-none absolute top-full mt-5
             opacity-0 -translate-y-2
             group-hover:opacity-100 group-hover:translate-y-0
             transition-all duration-200 ease-out
             text-xs md:text-sm
             px-2.5 py-1 rounded-md
             bg-base-200 text-base-content
             dark:bg-zinc-800 dark:text-gray-100
             shadow-md
             whitespace-nowrap" role="status" aria-hidden="true">
      {{ displayText }}
    </div>
  </div>
</section>
