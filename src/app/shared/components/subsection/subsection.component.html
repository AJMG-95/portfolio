<section
  class="max-w-3xl w-full px-4 sm:px-6 md:px-8 text-left focus:outline-none transition-opacity duration-500 ease-in-out dark:text-gray-100"
  [attr.aria-labelledby]="titleKey">
  <h2 [id]="titleKey" class="text-2xl font-semibold mb-4 text-gray-800 dark:text-white">
    {{ titleKey | transloco }}
  </h2>

  <div class="space-y-2 animate-fade-in">
    <ng-content></ng-content>
  </div>
</section>
