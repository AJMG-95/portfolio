<section class="w-full px-4 sm:px-6 md:px-8 text-left focus:outline-none transition-opacity duration-500 ease-in-out"
  [attr.aria-labelledby]="titleKey">

  <!-- Caja decorativa del título -->
  <header class="rounded-md mb-4 p-4 shadow-sm border
           bg-gray-50 dark:bg-gray-700
           border-borderLight dark:border-darkBorderLight" role="presentation">
    <h2 [id]="titleKey" class="text-2xl font-semibold text-primary dark:text-darkTextMain">
      {{ titleKey | transloco }}
    </h2>
  </header>

  <div class="space-y-2 animate-fade-in">
    <ng-content></ng-content>
  </div>
</section>
