<li class="flex items-center gap-3">
  <span class="sr-only">{{ type }}</span>

  <svg class="w-5 h-5 text-primary dark:text-darkHighlight" fill="none" stroke="currentColor" stroke-width="2"
    viewBox="0 0 24 24" aria-hidden="true">
    <path [attr.d]="iconPath" stroke-linecap="round" stroke-linejoin="round" />
  </svg>

  <ng-container [ngSwitch]="type">
    <!-- Email -->
    <a *ngSwitchCase="'email'" [href]="'mailto:' + value"
      class="hover:underline focus:outline-none focus:ring-2 focus:ring-focusOutline dark:focus:ring-offset-gray-900">
      {{ value }}
    </a>

    <!-- Teléfono -->
    <a *ngSwitchCase="'phone'" [href]="'tel:' + value"
      class="hover:underline focus:outline-none focus:ring-2 focus:ring-focusOutline dark:focus:ring-offset-gray-900">
      {{ value }}
    </a>

    <!-- Enlace externo -->
    <a *ngSwitchCase="'link'" [href]="value" [target]="external ? '_blank' : null" rel="noopener noreferrer"
      class="hover:underline focus:outline-none focus:ring-2 focus:ring-focusOutline dark:focus:ring-offset-gray-900">
      {{ label }}
    </a>
  </ng-container>
</li>
