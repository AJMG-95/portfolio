<li class="flex items-center gap-5 touch-manipulation">
  <!-- Solo accesible por lectores de pantalla -->
  <span class="sr-only">{{ type }}</span>

  <a [href]="href" [attr.target]="external && type === 'link' ? '_blank' : null"
    [attr.rel]="external && type === 'link' ? 'noopener noreferrer' : null" class="group flex items-center gap-3 transition-transform duration-200
           focus:outline-none focus:ring-2 focus:ring-focusOutline dark:focus:ring-offset-gray-900">

    <!-- Icono -->
    <span class="transition-transform duration-200
             group-hover:scale-110
             group-active:scale-95
             group-active:rotate-6
             group-focus-visible:scale-110">
      <ng-content select="[icon]"></ng-content>
    </span>

    <!-- Texto -->
    <span class="transition-transform duration-200
             group-hover:scale-110 group-hover:translate-x-2
             group-focus-visible:scale-110 group-focus-visible:translate-x-2">
      {{ displayText }}
    </span>
  </a>
</li>
