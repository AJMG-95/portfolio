<section
  class="relative overflow-hidden min-h-screen flex flex-col-reverse md:flex-row items-center justify-center gap-12 py-12 px-4 sm:px-6 lg:px-16 bg-background text-textMain dark:bg-darkBackground dark:text-darkTextMain"
  aria-label="Presentación personal">

  <!-- Fondo decorativo animado superior derecho -->
  <div aria-hidden="true"
    class="absolute -top-10 -right-10 w-[400px] h-[400px] bg-gradient-to-tr from-primary/30 via-accent/20 to-transparent rounded-full blur-3xl animate-fadeIn dark:from-accent/20 dark:via-white/10">
  </div>

  <!-- Fondo decorativo animado inferior izquierdo -->
  <div aria-hidden="true"
    class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-gradient-to-bl from-accent/20 via-primary/20 to-transparent rounded-full blur-2xl animate-fadeIn delay-500 dark:from-white/10 dark:via-accent/10">
  </div>

  <!-- Texto -->
  <div
    class="relative z-10 text-center md:text-left space-y-6 animate-fadeIn w-full md:w-[500px] lg:w-[600px] xl:w-[700px]">
    <typewriter-text [text]="'👋 ' + greeting" [start]="true"
      [class]="'text-3xl sm:text-4xl font-extrabold tracking-tight text-primary dark:text-white'" [tag]="'h1'"
      [onFinish]="onFirstTypingFinish.bind(this)">
    </typewriter-text>

    <typewriter-text [text]="description" [start]="typing2Started"
      [class]="'text-base sm:text-lg text-textSoft dark:text-darkTextSoft'" [tag]="'p'">
    </typewriter-text>

    <p class="text-sm sm:text-base font-medium text-highlight dark:text-darkHighlight">
      {{ stack }}
    </p>

    <p class="italic text-sm sm:text-base text-textSoft dark:text-darkTextSoft">
      "{{ claim }}"
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start mt-6">
      <a routerLink="/projects"
        class="focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary dark:focus-visible:ring-white">
        <app-button>{{ projectsBtn }}</app-button>
      </a>
      <a routerLink="/contact"
        class="focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary dark:focus-visible:ring-white">
        <app-button variant="secondary">{{ contactBtn }}</app-button>
      </a>
    </div>
  </div>

  <!-- Foto de perfil animada -->
  <div class="shrink-0 animate-fadeIn w-64 h-64">
    <profile-photo></profile-photo>
  </div>

  <!-- Indicador de scroll animado -->
  <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 animate-bounce">
    <span class="sr-only">Scroll down</span>
    <svg class="w-6 h-6 text-primary dark:text-accent" fill="none" stroke="currentColor" stroke-width="2"
      viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>
</section>
