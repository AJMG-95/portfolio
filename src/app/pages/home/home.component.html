
<page-wrapper [addClasses]="'items-center justify-center'">

  <div class="flex flex-col-reverse md:flex-row animate-fadeIn  items-center justify-between gap-12 w-full max-w-7xl z-10 px-4">
    <div class="text-center md:text-left space-y-6 w-full md:w-1/2">

      <ng-container *ngIf="showTypewriters()">
        <typewriter-text [text]="greeting()" [start]="typing1Started" [key]="typewriterKey()"
          [class]="'text-3xl sm:text-4xl font-extrabold tracking-tight text-primary dark:text-white'"
          [tag]="'h1'"
          [onFinish]="onFirstTypingFinish.bind(this)">
        </typewriter-text>

        <typewriter-text [text]="description()" [start]="typing2Started" [key]="typewriterKey()"
          [class]="'text-base sm:text-lg text-textSoft dark:text-darkTextSoft'"
          [tag]="'p'">
        </typewriter-text>

      </ng-container>

      <p class="text-sm sm:text-base font-medium text-textSoft dark:text-darkHighlight">
        {{ stack() }}
      </p>

      <p class="italic text-sm sm:text-base text-textSoft dark:text-darkTextSoft">
        "{{ claim() }}"
      </p>

      <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start mt-6">
        <a routerLink="/projects"
          class="focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary dark:focus-visible:ring-white">
          <app-button>{{ projectsBtn() }}</app-button>
        </a>
        <a routerLink="/contact"
          class="focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary dark:focus-visible:ring-white">
          <app-button variant="secondary">{{ contactBtn() }}</app-button>
        </a>
      </div>
    </div>

    <profile-photo *ngIf="showPhoto" src="assets/images/mePhoto.jpg"
      [class]="'w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 rounded-full animate-fadeInOpacity'"></profile-photo>
  </div>

</page-wrapper>
