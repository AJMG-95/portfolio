<page-wrapper [addClasses]="'flex-col items-center gap-12'" aria-label="Contact-me">

  <h1 id="contact-title"
    class="text-4xl sm:text-5xl mb-12 font-extrabold text-center text-primary dark:text-darkHighlight transition-colors">
    {{ 'contact.title' | transloco }}
  </h1>

  <p class="text-textSoft dark:text-darkTextSoft mb-8">
    {{ 'home.claim' | transloco }}
  </p>

  <ul class="flex flex-col gap-6 text-sm sm:text-base" aria-label="Información de contacto">

    <app-contact-info type="email" [value]="'contact.email' | transloco" [subject]="'contact.emailSubject' | transloco"
      [body]="'contact.emailBody' | transloco">
      <svg icon class="w-5 h-5 text-primary dark:text-darkHighlight" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
    </app-contact-info>

    <app-contact-info type="phone" [value]="'contact.phone' | transloco">
      <svg icon class="w-5 h-5 text-primary dark:text-darkHighlight" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 5a2 2 0 012-2h3.28a2 2 0 011.789 1.106l1.387 2.773a2 2 0 01-.348 2.3L9.21 11.37a11.042 11.042 0 005.42 5.42l2.192-1.896a2 2 0 012.3-.348l2.773 1.387A2 2 0 0121 17.72V21a2 2 0 01-2 2h-1C9.163 23 1 14.837 1 5V4a2 2 0 012-2z" />
      </svg>
    </app-contact-info>

    <app-contact-info type="link" [value]="'contact.linkedin' | transloco" [label]="'LinkedIn'" [external]="true">
      <svg icon class="w-5 h-5 text-primary dark:text-darkHighlight" fill="currentColor" viewBox="0 0 24 24"
        aria-hidden="true">
        <path
          d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.761 2.24 5 5 5h14c2.76 0 5-2.239 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.25c-.966 0-1.75-.783-1.75-1.75s.784-1.75 1.75-1.75 1.75.783 1.75 1.75-.784 1.75-1.75 1.75zm13.5 11.25h-3v-5.5c0-1.38-1.12-2.5-2.5-2.5s-2.5 1.12-2.5 2.5v5.5h-3v-10h3v1.5c.676-.94 1.787-1.5 3-1.5 2.21 0 4 1.79 4 4v6z" />
      </svg>
    </app-contact-info>

    <app-contact-info type="link" [value]="'contact.github' | transloco" [label]="'GitHub'" [external]="true">
      <svg icon class="w-5 h-5 text-primary dark:text-darkHighlight" fill="currentColor" viewBox="0 0 24 24"
        aria-hidden="true">
        <path
          d="M12 .5C5.73.5.5 5.74.5 12.02c0 5.1 3.29 9.42 7.86 10.96.58.11.79-.25.79-.55 0-.27-.01-1.14-.02-2.07-3.2.7-3.88-1.39-3.88-1.39-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.24.73-1.52-2.56-.3-5.26-1.28-5.26-5.71 0-1.26.45-2.29 1.18-3.1-.12-.3-.51-1.52.11-3.16 0 0 .97-.31 3.18 1.18a11.01 11.01 0 015.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.64.24 2.86.12 3.16.74.81 1.18 1.84 1.18 3.1 0 4.44-2.7 5.4-5.28 5.69.41.35.77 1.04.77 2.11 0 1.52-.01 2.75-.01 3.12 0 .3.21.66.8.55A10.993 10.993 0 0023.5 12c0-6.28-5.23-11.5-11.5-11.5z" />
      </svg>
    </app-contact-info>

  </ul>

</page-wrapper>
